<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spark Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #07070e;
  --surface: #0f0f1a;
  --surface2: #161625;
  --surface3: #1e1e32;
  --surface4: #26263e;
  --accent: #3b82f6;
  --accent2: #10b981;
  --accent3: #f59e0b;
  --glow: rgba(59,130,246,0.4);
  --glow2: rgba(16,185,129,0.3);
  --text: #eeeaff;
  --text-muted: #9490bb;
  --text-dim: #4e4b6e;
  --border: rgba(255,255,255,0.06);
  --border-accent: rgba(59,130,246,0.45);
  --danger: #fc5c7d;
  --green: #10b981;
  --warn: #fccc5c;
  --radius: 20px;
  --radius-sm: 12px;
  --radius-lg: 24px;
}

body[data-theme="light"] {
  --bg: #f8fafc;
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --surface3: #e2e8f0;
  --surface4: #cbd5e1;
  --text: #1e293b;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --border: rgba(0,0,0,0.06);
  --border-accent: rgba(59,130,246,0.2);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center;}

/* ── Background ── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:0.15;animation:drift 16s ease-in-out infinite;}
.orb.a{width:700px;height:700px;background:radial-gradient(circle,#7c5cfc,#c45cfc);top:-200px;left:-200px;animation-delay:0s;}
.orb.b{width:500px;height:500px;background:radial-gradient(circle,#5cf4fc,#5cfc9e);bottom:-150px;right:-100px;animation-delay:-6s;}
.orb.c{width:400px;height:400px;background:radial-gradient(circle,#c45cfc,#fc5c7d);top:40%;left:55%;animation-delay:-11s;}
@keyframes drift{0%,100%{transform:translate(0,0);}33%{transform:translate(40px,-30px);}66%{transform:translate(-25px,40px);}};
.grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:48px 48px;}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ── Wrapper ── */
#wrapper{position:relative;z-index:1;width:100%;max-width:480px;height:100vh;max-height:820px;display:flex;flex-direction:column;}

/* ── Auth pages ── */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;height:100%;animation:page-in 0.5s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes page-in{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

.brand{text-align:center;margin-bottom:36px;}
.brand-icon{width:68px;height:68px;border-radius:22px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 0 40px var(--glow),0 0 80px var(--glow2);animation:pulse-brand 3s ease-in-out infinite;}
@keyframes pulse-brand{0%,100%{box-shadow:0 0 40px var(--glow),0 0 80px var(--glow2);}50%{box-shadow:0 0 60px var(--glow),0 0 100px var(--glow2),0 0 140px rgba(196,92,252,0.15);}};
.brand h1{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;background:linear-gradient(135deg,#fff 40%,#c45cfc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-1px;}
.brand p{font-size:14px;color:var(--text-muted);margin-top:6px;}

.auth-card{width:100%;background:rgba(15,15,26,0.85);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;backdrop-filter:blur(30px);box-shadow:0 0 0 1px rgba(124,92,252,0.06),0 40px 80px rgba(0,0,0,0.5);}

.tab-row{display:flex;gap:4px;margin-bottom:28px;background:var(--surface2);border-radius:12px;padding:4px;}
.tab-btn{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;color:var(--text-muted);cursor:pointer;transition:all 0.22s;}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px var(--glow);}

.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text-muted);margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase;font-family:'Syne',sans-serif;}
.field-wrap{position:relative;display:flex;align-items:center;}
.field-wrap .f-icon{position:absolute;left:13px;color:var(--text-dim);pointer-events:none;flex-shrink:0;}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px 12px 42px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.field input::placeholder{color:var(--text-dim);}
.field input:focus{border-color:var(--border-accent);box-shadow:0 0 0 4px rgba(124,92,252,0.12);}
.field .toggle-pw{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px;border-radius:6px;transition:color 0.15s;}
.field .toggle-pw:hover{color:var(--text-muted);}

.field-error{font-size:12px;color:var(--danger);margin-top:5px;display:none;}

.submit-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),var(--accent2));font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:#fff;cursor:pointer;margin-top:8px;transition:all 0.2s;box-shadow:0 6px 24px var(--glow);letter-spacing:0.01em;display:flex;align-items:center;justify-content:center;gap:8px;}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px var(--glow);}
.submit-btn:active{transform:translateY(0) scale(0.98);}
.submit-btn:disabled{opacity:0.55;transform:none;cursor:not-allowed;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;font-size:12px;color:var(--text-dim);}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

.google-btn{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;}
.google-btn:hover{background:var(--surface3);border-color:rgba(255,255,255,0.12);color:var(--text);}

.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text-dim);}
.auth-footer a{color:var(--accent2);cursor:pointer;text-decoration:none;}
.auth-footer a:hover{text-decoration:underline;}

/* ── Alert / toast ── */
#auth-alert{display:none;padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;border:1px solid;}
#auth-alert.error{background:rgba(252,92,125,0.1);border-color:rgba(252,92,125,0.3);color:#ff8fa6;}
#auth-alert.success{background:rgba(92,252,162,0.1);border-color:rgba(92,252,162,0.3);color:#5cfca2;}

/* ── Chat app ── */
#chat-app{display:none;flex-direction:column;height:100%;border:1px solid var(--border);border-radius:28px;overflow:hidden;background:rgba(10,10,20,0.9);backdrop-filter:blur(40px);box-shadow:0 0 0 1px rgba(124,92,252,0.06),0 40px 80px rgba(0,0,0,0.6);animation:page-in 0.5s cubic-bezier(0.16,1,0.3,1) both;}

/* Header */
#chat-header{padding:16px 20px;background:rgba(7,7,14,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.chat-avatar{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;box-shadow:0 0 18px var(--glow);flex-shrink:0;}
.chat-info h2{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--text);}
.chat-info p{font-size:12px;color:var(--text-muted);margin-top:1px;}
#online-label{color:var(--green);transition:color 0.3s;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.user-pill{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:50px;padding:5px 12px 5px 8px;font-size:12px;color:var(--text-muted);}
.user-pill .up-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
#logout-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all 0.2s;}
#logout-btn:hover{background:rgba(252,92,125,0.15);border-color:rgba(252,92,125,0.3);color:var(--danger);}

/* Messages */
#messages{flex:1;overflow-y:auto;padding:18px 16px 12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:3px;}

.msg-row{display:flex;align-items:flex-end;gap:8px;animation:msg-pop 0.3s cubic-bezier(0.16,1,0.3,1) both;}
@keyframes msg-pop{from{opacity:0;transform:translateY(10px) scale(0.97);}to{opacity:1;transform:none;}}
.msg-row.own{flex-direction:row-reverse;}

.msg-ava{width:26px;height:26px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:'Syne',sans-serif;margin-bottom:2px;}
.msg-ava.other{background:var(--surface3);color:var(--text-muted);}
.msg-ava.self{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}

.msg-content{max-width:80%;display:flex;flex-direction:column;gap:3px;}
.msg-row.own .msg-content{align-items:flex-end;}

.msg-bubble{padding:12px 16px;border-radius:var(--radius-lg);font-size:14px;line-height:1.6;word-break:break-word;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.msg-bubble.in{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
.msg-bubble.out{background:linear-gradient(135deg,var(--accent),var(--accent2));border-bottom-right-radius:4px;color:#fff;box-shadow:0 4px 18px var(--glow);}
.msg-bubble img{max-width:200px;border-radius:10px;display:block;margin-top:6px;}

.msg-name{font-size:10px;color:var(--text-dim);font-family:'Syne',sans-serif;padding:0 4px;}
.msg-row.own .msg-name{text-align:right;}

.msg-meta{display:flex;align-items:center;gap:5px;padding:0 4px;}
.msg-row.own .msg-meta{flex-direction:row-reverse;}
.msg-time{font-size:10px;color:var(--text-dim);}
.del-btn{opacity:0;background:none;border:none;cursor:pointer;color:var(--text-dim);padding:2px 4px;border-radius:4px;transition:all 0.15s;display:flex;align-items:center;}
.del-btn.own-only{display:none;}
.msg-row.own:hover .del-btn.own-only{display:flex;opacity:1;}
.del-btn:hover{color:var(--danger);background:rgba(252,92,125,0.12);}

.empty-chat{margin:auto;text-align:center;padding:32px 20px;}
.empty-icon{width:60px;height:60px;border-radius:18px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.empty-chat h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:5px;}
.empty-chat p{font-size:13px;color:var(--text-muted);}

/* Preview */
#preview-bar{display:none;padding:10px 18px;border-top:1px solid var(--border);align-items:center;gap:10px;background:rgba(7,7,14,0.7);}
#preview-thumb{width:52px;height:52px;object-fit:cover;border-radius:10px;}
.preview-info p{font-size:13px;color:var(--text-muted);}
.preview-info span{font-size:11px;color:var(--text-dim);}
#clear-preview{background:none;border:none;cursor:pointer;width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all 0.15s;}
#clear-preview:hover{background:rgba(252,92,125,0.15);color:var(--danger);}

/* Input */
#input-area{padding:12px 14px 16px;background:rgba(7,7,14,0.85);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-end;gap:9px;flex-shrink:0;}
.input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:16px;display:flex;align-items:flex-end;transition:border-color 0.2s,box-shadow 0.2s;}
.input-wrap:focus-within{border-color:var(--border-accent);box-shadow:0 0 0 4px rgba(124,92,252,0.1);}
#msg-input{flex:1;background:none;border:none;outline:none;padding:11px 13px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);resize:none;height:40px;max-height:110px;line-height:1.5;}
#msg-input::placeholder{color:var(--text-dim);}
.act-btn{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.2s;flex-shrink:0;}
.act-btn:hover{background:var(--surface3);border-color:var(--border-accent);color:var(--accent);transform:scale(1.06);}
#send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 4px 16px var(--glow);transition:all 0.2s;flex-shrink:0;}
#send-btn:hover{transform:scale(1.08);box-shadow:0 6px 24px var(--glow);}
#send-btn:active{transform:scale(0.95);}
#send-btn:disabled{opacity:0.5;transform:none;}
#camera-file{display:none;}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);border:1px solid var(--border);color:var(--text);font-size:13px;padding:10px 22px;border-radius:50px;opacity:0;transition:all 0.28s;z-index:999;pointer-events:none;white-space:nowrap;backdrop-filter:blur(16px);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;}
</style>
</head>
<body>

<div class="bg">
  <div class="orb a"></div>
  <div class="orb b"></div>
  <div class="orb c"></div>
</div>
<div class="grid"></div>
<div class="noise"></div>

<div id="wrapper">

  <!-- ══ AUTH ══ -->
  <div id="auth-page" class="auth-page">
    <div class="brand">
      <div class="brand-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h1>Spark Chat</h1>
      <p>Real-time messaging, beautifully done.</p>
    </div>

    <div class="auth-card">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <div id="auth-alert"></div>

      <!-- Login form -->
      <div id="form-login">
        <div class="field">
          <label>Email</label>
          <div class="field-wrap">
            <span class="f-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <span class="f-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" onclick="togglePw('login-password',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <button class="submit-btn" id="login-btn" onclick="doLogin()">
          <span>Sign In</span>
        </button>
        <div class="divider">or</div>
        <button class="google-btn" onclick="doGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>

      <!-- Signup form -->
      <div id="form-signup" style="display:none;">
        <div class="field">
          <label>Display Name</label>
          <div class="field-wrap">
            <span class="f-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
            <input type="text" id="signup-name" placeholder="Your name" autocomplete="name"/>
          </div>
        </div>
        <div class="field">
          <label>Email</label>
          <div class="field-wrap">
            <span class="f-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"/>
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="field-wrap">
            <span class="f-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <input type="password" id="signup-password" placeholder="Min. 6 characters" autocomplete="new-password"/>
            <button type="button" class="toggle-pw" onclick="togglePw('signup-password',this)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
          </div>
        </div>
        <button class="submit-btn" id="signup-btn" onclick="doSignup()">
          <span>Create Account</span>
        </button>
        <div class="divider">or</div>
        <button class="google-btn" onclick="doGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continue with Google
        </button>
      </div>
    </div>
  </div>

  <!-- ══ CHAT ══ -->
  <div id="chat-app">
    <div id="chat-header">
      <div class="chat-avatar" id="chat-ava">S</div>
      <div class="chat-info">
        <h2>Spark Chat</h2>
        <p><span id="online-label">Connecting…</span></p>
      </div>
<div class="hdr-right">
        <div class="user-pill">
          <div class="up-dot"></div>
          <span id="user-name-pill">You</span>
        </div>
        <button id="theme-toggle" title="Toggle theme" onclick="toggleTheme()" style="width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-dim);transition:all 0.2s;">
          <svg id="theme-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
        </button>
        <button id="logout-btn" title="Sign out" onclick="doLogout()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div id="messages">
      <div class="empty-chat" id="empty-chat">
        <div class="empty-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <h3>No messages yet</h3>
        <p>Start the conversation ✨</p>
      </div>
    </div>

    <div id="preview-bar">
      <img id="preview-thumb" src="" alt=""/>
      <div class="preview-info"><p>Image attached</p><span>Ready to send</span></div>
      <button id="clear-preview" onclick="clearPreview()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>

    <div id="input-area">
      <input type="file" id="camera-file" accept="image/*" capture="environment"/>
      <button class="act-btn" onclick="document.getElementById('camera-file').click()" title="Attach image">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <div class="input-wrap">
        <textarea id="msg-input" placeholder="Type a message…" rows="1"></textarea>
      </div>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

</div><!-- /wrapper -->

<div id="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
/* ═══════════════════════════════════════
   Firebase init
═══════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyAacJShK_nUaTDhyx5EMXKXhVJfRu9gZ7w",
  authDomain: "newprojec-8b490.firebaseapp.com",
  projectId: "newprojec-8b490",
  storageBucket: "newprojec-8b490.firebasestorage.app",
  messagingSenderId: "725434752291",
  appId: "1:725434752291:web:9515ee60ffc515ec0d8096",
  measurementId: "G-3KY5E5RXZY",
  databaseURL: "https://newprojec-8b490-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const auth    = firebase.auth();
const db      = firebase.database();
const storage = firebase.storage();
const msgRef  = db.ref('messages');

/* ═══════════════════════════════════════
   State
═══════════════════════════════════════ */
let currentUser = null;
let pendingFile = null;
let dbListener  = null;

/* ═══════════════════════════════════════
   Auth state observer
═══════════════════════════════════════ */
auth.onAuthStateChanged(user => {
  if (user) {
    currentUser = user;
    showChat(user);
  } else {
    currentUser = null;
    showAuth();
  }
});

/* ═══════════════════════════════════════
   UI switches
═══════════════════════════════════════ */
function showAuth() {
  document.getElementById('auth-page').style.display = 'flex';
  document.getElementById('chat-app').style.display = 'none';
  if (dbListener) { msgRef.off('value', dbListener); dbListener = null; }
}

function showChat(user) {
  document.getElementById('auth-page').style.display = 'none';
  const chat = document.getElementById('chat-app');
  chat.style.display = 'flex';

  const name = user.displayName || user.email.split('@')[0];
  const initials = name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  document.getElementById('chat-ava').textContent = initials;
  document.getElementById('user-name-pill').textContent = name;
  startListening();
}

/* ═══════════════════════════════════════
   Tab switch
═══════════════════════════════════════ */
function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
  document.getElementById('form-login').style.display  = tab==='login'  ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab==='signup' ? 'block' : 'none';
  hideAlert();
}

/* ═══════════════════════════════════════
   Alert helpers
═══════════════════════════════════════ */
function showAlert(msg, type='error') {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.className = type;
  el.style.display = 'block';
}
function hideAlert() {
  const el = document.getElementById('auth-alert');
  el.style.display = 'none';
}

/* ═══════════════════════════════════════
   Password toggle
═══════════════════════════════════════ */
function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  } else {
    inp.type = 'password';
    btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
  }
}

/* ═══════════════════════════════════════
   Auth actions
═══════════════════════════════════════ */
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { showAlert('Please fill in all fields.'); return; }
  const btn = document.getElementById('login-btn');
  setLoading(btn, true);
  hideAlert();
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    showAlert('Welcome back!', 'success');
  } catch(e) {
    showAlert(friendlyError(e.code));
  }
  setLoading(btn, false, 'Sign In');
}

async function doSignup() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;
  if (!name || !email || !pass) { showAlert('Please fill in all fields.'); return; }
  if (pass.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
  const btn = document.getElementById('signup-btn');
  setLoading(btn, true);
  hideAlert();
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    showAlert('Account created! Welcome 🎉', 'success');
  } catch(e) {
    showAlert(friendlyError(e.code));
  }
  setLoading(btn, false, 'Create Account');
}

async function doGoogle() {
  hideAlert();
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(provider);
  } catch(e) {
    showAlert(friendlyError(e.code));
  }
}

async function doLogout() {
  await auth.signOut();
  showToast('Signed out');
}

function setLoading(btn, loading, label='') {
  if (loading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    btn.disabled = false;
    btn.innerHTML = `<span>${label}</span>`;
  }
}

function friendlyError(code) {
  const map = {
    'auth/user-not-found': 'No account found with this email.',
    'auth/wrong-password': 'Incorrect password. Try again.',
    'auth/invalid-email': 'Please enter a valid email address.',
    'auth/email-already-in-use': 'This email is already registered.',
    'auth/weak-password': 'Password must be at least 6 characters.',
    'auth/too-many-requests': 'Too many attempts. Please wait a moment.',
    'auth/popup-closed-by-user': 'Sign-in popup was closed.',
    'auth/invalid-credential': 'Invalid credentials. Please try again.',
  };
  return map[code] || 'Something went wrong. Please try again.';
}

/* ═══════════════════════════════════════
   Chat logic
═══════════════════════════════════════ */
function startListening() {
  const messagesDiv = document.getElementById('messages');
  document.getElementById('online-label').textContent = 'Online · Live';
  document.getElementById('online-label').style.color = 'var(--green)';

  dbListener = msgRef.on('value', snap => {
    const rows = messagesDiv.querySelectorAll('.msg-row');
    rows.forEach(r => r.remove());

    const val = snap.val();
    if (!val) {
      let es = document.getElementById('empty-chat');
      if (!es) {
        es = document.createElement('div');
        es.className = 'empty-chat'; es.id = 'empty-chat';
        es.innerHTML = `<div class="empty-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#7c5cfc" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><h3>No messages yet</h3><p>Start the conversation ✨</p>`;
        messagesDiv.appendChild(es);
      }
      return;
    }
    const es = document.getElementById('empty-chat');
    if (es) es.remove();
    Object.entries(val).forEach(([id,msg]) => renderMsg(id, msg));
  }, () => {
    document.getElementById('online-label').textContent = 'Connection error';
    document.getElementById('online-label').style.color = 'var(--danger)';
  });

  msgRef.on('child_removed', snap => {
    const el = document.getElementById('msg-' + snap.key);
    if (el) { el.style.opacity='0'; el.style.transform='scale(0.9)'; el.style.transition='all 0.2s'; setTimeout(()=>el.remove(),200); }
    showToast('Message deleted');
  });
}

function renderMsg(id, msg) {
  if (document.getElementById('msg-' + id)) return;
  const messagesDiv = document.getElementById('messages');
  const isOwn = currentUser && msg.uid === currentUser.uid;

  const row = document.createElement('div');
  row.className = 'msg-row' + (isOwn ? ' own' : '');
  row.id = 'msg-' + id;

  const ava = document.createElement('div');
  ava.className = 'msg-ava ' + (isOwn ? 'self' : 'other');
  const senderName = msg.displayName || 'U';
  ava.textContent = senderName.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);

  const content = document.createElement('div');
  content.className = 'msg-content';

  if (!isOwn) {
    const nameEl = document.createElement('div');
    nameEl.className = 'msg-name';
    nameEl.textContent = senderName;
    content.appendChild(nameEl);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + (isOwn ? 'out' : 'in');
  if (msg.text) { const p = document.createElement('p'); p.textContent = msg.text; bubble.appendChild(p); }
  if (msg.imageUrl) { const img = document.createElement('img'); img.src = msg.imageUrl; img.alt='img'; bubble.appendChild(img); }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const time = document.createElement('span');
  time.className = 'msg-time';
  time.textContent = new Date(msg.timestamp||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  meta.appendChild(time);
  if (isOwn) {
    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn own-only';
    delBtn.title = 'Delete';
    delBtn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
    delBtn.onclick = () => { if(confirm('Delete this message?')) msgRef.child(id).remove(); };
    meta.appendChild(delBtn);
  }
  content.appendChild(bubble);
  content.appendChild(meta);
  row.appendChild(ava);
  row.appendChild(content);
  messagesDiv.appendChild(row);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text && !pendingFile) return;
  if (!currentUser) { showToast('Please sign in first'); return; }

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    const payload = {
      timestamp: Date.now(),
      uid: currentUser.uid,
      displayName: currentUser.displayName || currentUser.email.split('@')[0]
    };
    if (text) payload.text = text;
    if (pendingFile) {
      const ref = storage.ref('chat-images/' + Date.now() + '-' + pendingFile.name);
      await ref.put(pendingFile);
      payload.imageUrl = await ref.getDownloadURL();
    }
    await msgRef.push(payload);
    input.value = '';
    input.style.height = '40px';
    clearPreview();
  } catch(e) {
    showToast('Error: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`;
  input.focus();
}

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = '40px';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});
document.getElementById('camera-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  pendingFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('preview-thumb').src = ev.target.result;
    document.getElementById('preview-bar').style.display = 'flex';
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

function clearPreview() {
  pendingFile = null;
  document.getElementById('preview-bar').style.display = 'none';
  document.getElementById('preview-thumb').src = '';
}

/* ── Toast ── */
function showToast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

/* ── Enter key on auth inputs ── */
document.getElementById('login-password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('signup-password').addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });

/* ── Theme Toggle ── */
function toggleTheme() {
  const body = document.body;
  const isLight = body.dataset.theme === 'light';
  body.dataset.theme = isLight ? 'dark' : 'light';
  localStorage.setItem('theme', body.dataset.theme);
  updateThemeIcon();
}

function updateThemeIcon() {
  const icon = document.getElementById('theme-icon');
  const isLight = document.body.dataset.theme === 'light';
  if (isLight) {
    icon.innerHTML = `<path stroke="currentColor" stroke-width="2" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
  } else {
    icon.innerHTML = `<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>`;
  }
}

function initTheme() {
  const saved = localStorage.getItem('theme') || 'dark';
  document.body.dataset.theme = saved;
  updateThemeIcon();
}

// Init on load
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', initTheme);
} else {
  initTheme();
}

document.getElementById('theme-toggle').addEventListener('mouseenter', () => {
  document.getElementById('theme-toggle').style.transform = 'scale(1.05)';
});
document.getElementById('theme-toggle').addEventListener('mouseleave', () => {
  document.getElementById('theme-toggle').style.transform = 'scale(1)';
});
</script>

</body>
</html>
